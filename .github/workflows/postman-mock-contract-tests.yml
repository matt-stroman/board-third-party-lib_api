name: Postman Contract Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: postman-mock-contract-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  COLLECTION_PATH: postman/collections/board-third-party-library-api.contract-tests.postman_collection.json
  ENVIRONMENT_PATH: postman/environments/board-third-party-library_mock.postman_environment.json
  ADMIN_ENVIRONMENT_PATH: postman/environments/board-third-party-library_mock-admin.postman_environment.json

jobs:
  api-lint:
    name: API Tests - Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Lint OpenAPI specification
        run: >-
          npx @redocly/cli lint postman/specs/board-third-party-library-api.v1.openapi.yaml
          --skip-rule info-license
          --skip-rule no-server-example.com
          --skip-rule operation-4xx-response
          --skip-rule operation-2xx-response

  postman-cli-mock-tests:
    name: API Tests - Contract (Mock)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: api-lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Provision mock server for this run
        id: provision_mock
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          IS_FORK_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}
        run: |
          if [ -z "$POSTMAN_API_KEY" ]; then
            if [ "$IS_FORK_PR" = "true" ]; then
              echo "Skipping Postman CLI mock tests for fork PR: POSTMAN_API_KEY secret is unavailable to fork PRs."
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Missing required repository secret: POSTMAN_API_KEY" >&2
            exit 1
          fi

          node ./scripts/postman-provision-mock.mjs \
            --admin-env "$ADMIN_ENVIRONMENT_PATH" \
            --collection "$COLLECTION_PATH" \
            --mode ephemeral

      - name: Run Postman CLI mock contract tests
        if: steps.provision_mock.outputs.should_run == 'true'
        uses: postmanlabs/postman-cli-action@v1
        with:
          postman-cli-version: 1.29.5
          working-directory: .
          command: >-
            collection run postman/collections/board-third-party-library-api.contract-tests.postman_collection.json
            --environment postman/environments/board-third-party-library_mock.postman_environment.json
            --env-var baseUrl=${{ steps.provision_mock.outputs.base_url }}
            --env-var contractExecutionMode=mock
            --bail failure
            --reporters cli,junit
            --reporter-junit-export postman-cli-reports/results.xml

      - name: Note skipped mock tests (fork PR without secret)
        if: steps.provision_mock.outputs.should_run == 'false'
        run: echo "Postman CLI mock contract tests were skipped because POSTMAN_API_KEY is not available for this fork pull request."

      - name: Delete CI mock server
        if: always() && steps.provision_mock.outputs.mock_id != ''
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          POSTMAN_API_BASE: ${{ steps.provision_mock.outputs.api_base }}
          POSTMAN_MOCK_ID: ${{ steps.provision_mock.outputs.mock_id }}
        run: node ./scripts/postman-delete-mock.mjs

      - name: Upload Postman CLI report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postman-cli-report
          path: postman-cli-reports/results.xml
          if-no-files-found: ignore
