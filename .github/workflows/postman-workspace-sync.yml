name: Postman Workspace Sync

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: postman-workspace-sync-${{ github.ref }}
  cancel-in-progress: true

env:
  COLLECTION_PATH: postman/collections/board-third-party-library-api.contract-tests.postman_collection.json
  ADMIN_ENVIRONMENT_PATH: postman/environments/board-third-party-library_mock-admin.postman_environment.json
  POSTMAN_CLI_VERSION: 1.29.5

jobs:
  sync-workspace:
    name: Push workspace and reprovision shared mock
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Postman CLI
        run: npm install -g postman-cli@${POSTMAN_CLI_VERSION}

      - name: Authenticate Postman CLI
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          POSTMAN_REGION: ${{ vars.POSTMAN_REGION }}
        run: |
          REGION_ARGS=()
          if [ -n "${POSTMAN_REGION}" ]; then
            REGION_ARGS+=(--region "${POSTMAN_REGION}")
          fi

          postman login --with-api-key "${POSTMAN_API_KEY}" "${REGION_ARGS[@]}"

      - name: Push Native Git workspace artifacts
        run: |
          for attempt in 1 2 3 4; do
            echo "Workspace push attempt ${attempt}/4"

            if postman workspace push --yes; then
              exit 0
            fi

            if [ "${attempt}" -eq 4 ]; then
              echo "Workspace push failed after 4 attempts." >&2
              exit 1
            fi

            sleep $((attempt * 5))
          done

      - name: Reprovision shared mock server
        id: provision_shared_mock
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
        run: |
          node ./scripts/postman-provision-mock.mjs \
            --admin-env "$ADMIN_ENVIRONMENT_PATH" \
            --collection "$COLLECTION_PATH" \
            --mode shared

      - name: Validate synced mock with Postman CLI
        run: |
          mkdir -p postman-cli-reports
          postman collection run postman/collections/board-third-party-library-api.contract-tests.postman_collection.json \
            --environment postman/environments/board-third-party-library_mock.postman_environment.json \
            --env-var baseUrl=${{ steps.provision_shared_mock.outputs.base_url }} \
            --env-var contractExecutionMode=mock \
            --bail failure \
            --reporters cli,junit \
            --reporter-junit-export postman-cli-reports/workspace-sync-results.xml

      - name: Upload Postman CLI sync report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postman-workspace-sync-report
          path: postman-cli-reports/workspace-sync-results.xml
          if-no-files-found: ignore
