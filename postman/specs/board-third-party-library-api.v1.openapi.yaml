openapi: 3.0.3
info:
  title: Board Third Party Library API
  version: 1.0.0-draft
  description: >
    Contract-first API definition for the Board Third Party Library.
    Authentication is delegated to Keycloak, so custom password,
    registration, email-verification, refresh-token, and external-identity
    management endpoints have been removed from this contract. Application-owned
    Wave 1 persistence now includes a local user projection plus optional Board
    profile linkage/cache.
servers:
  - url: https://localhost:7085
    description: Local backend
tags:
  - name: Health
    description: Service metadata and health endpoints.
  - name: PlatformRoles
    description: Global platform roles.
  - name: Identity
    description: Keycloak-backed auth and current-user identity endpoints.
  - name: Moderation
    description: Moderator-only workflows for reviewing developer enrollment requests.
  - name: Organizations
    description: Public organization pages and authenticated organization management endpoints.
  - name: Acquisition
    description: Supported publisher discovery plus authenticated publisher connection and acquisition binding endpoints.
  - name: Catalog
    description: Public catalog browsing plus authenticated title, media, release, and artifact management endpoints.
paths:
  /:
    get:
      tags: [Health]
      summary: Get API metadata
      operationId: getApiMetadata
      security: []
      responses:
        '200':
          description: API metadata returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiMetadataResponse'
              examples:
                default:
                  value:
                    service: board-third-party-lib-backend
                    endpoints: [/health/live, /health/ready]
  /health/live:
    get:
      tags: [Health]
      summary: Liveness health check
      operationId: getLivenessHealth
      security: []
      responses:
        '200':
          description: API process is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                healthy:
                  value:
                    status: Healthy
                    checks: []
                    durationMs: 0.2149
  /health/ready:
    get:
      tags: [Health]
      summary: Readiness health check
      operationId: getReadinessHealth
      security: []
      parameters:
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
      responses:
        '200':
          description: API is ready and dependencies are healthy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                healthy:
                  value:
                    status: Healthy
                    checks:
                      - name: postgres
                        status: Healthy
                        description: PostgreSQL connection succeeded.
                        data:
                          database: board_tpl
                          user: board_tpl_user
                    durationMs: 6.1373
        '503':
          description: API is running but not ready due to dependency failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                postgres-unhealthy:
                  value:
                    status: Unhealthy
                    checks:
                      - name: postgres
                        status: Unhealthy
                        description: PostgreSQL connection failed.
                    durationMs: 12.551
  /identity/roles:
    get:
      tags: [PlatformRoles]
      summary: List platform roles
      operationId: listPlatformRoles
      security: []
      responses:
        '200':
          description: Platform roles returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformRoleListResponse'
              examples:
                default:
                  value:
                    roles:
                      - code: player
                        displayName: Player
                        scope: platform
                      - code: developer
                        displayName: Developer
                        scope: platform
                      - code: admin
                        displayName: Admin
                        scope: platform
                      - code: moderator
                        displayName: Moderator
                        scope: platform
  /identity/auth/config:
    get:
      tags: [Identity]
      summary: Get authentication configuration
      operationId: getAuthenticationConfiguration
      security: []
      responses:
        '200':
          description: Keycloak/OpenID Connect configuration returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationConfigurationResponse'
              examples:
                local:
                  value:
                    issuer: https://localhost:8443/realms/board-third-party-library/
                    authorizationEndpoint: https://localhost:8443/realms/board-third-party-library/protocol/openid-connect/auth
                    tokenEndpoint: https://localhost:8443/realms/board-third-party-library/protocol/openid-connect/token
                    logoutEndpoint: https://localhost:8443/realms/board-third-party-library/protocol/openid-connect/logout
                    jwksUri: https://localhost:8443/realms/board-third-party-library/protocol/openid-connect/certs
                    accountManagementUrl: https://localhost:8443/realms/board-third-party-library/account
                    clientId: board-third-party-library-backend
                    callbackUrl: https://localhost:7085/identity/auth/callback
                    scopes: [openid, profile, email]
                    registrationEnabled: true
                    externalIdentityProviders: []
  /identity/auth/login:
    get:
      tags: [Identity]
      summary: Start browser login with Keycloak
      operationId: startBrowserLogin
      security: []
      parameters:
        - name: provider
          in: query
          required: false
          schema:
            type: string
          description: Optional Keycloak identity provider alias.
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
      responses:
        '302':
          description: Redirects the caller to Keycloak.
          headers:
            Location:
              schema:
                type: string
                format: uri
              example: https://localhost:8443/realms/board-third-party-library/protocol/openid-connect/auth?client_id=board-third-party-library-backend&redirect_uri=https%3A%2F%2Flocalhost%3A7085%2Fidentity%2Fauth%2Fcallback&response_type=code&scope=openid%20profile%20email&state=st_mock_123&code_challenge=pkce_mock_123&code_challenge_method=S256
  /identity/auth/callback:
    get:
      tags: [Identity]
      summary: Complete browser login callback
      operationId: completeBrowserLoginCallback
      security: []
      parameters:
        - name: code
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
        - name: error
          in: query
          schema:
            type: string
        - name: error_description
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
      responses:
        '200':
          description: Keycloak code exchange succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationCallbackResponse'
              examples:
                success:
                  value:
                    accessToken: eyJhbGciOi...mock-access-token
                    refreshToken: eyJhbGciOi...mock-refresh-token
                    idToken: eyJhbGciOi...mock-id-token
                    tokenType: Bearer
                    expiresInSeconds: 300
                    scope: openid profile email
                    user:
                      subject: 5cfdbb44-2cf9-4aa2-b411-6c25b6690c4c
                      displayName: Local Admin
                      email: admin@boardtpl.local
                      emailVerified: true
                      identityProvider: null
                      roles: [admin, developer, player]
        '400':
          description: Callback arguments were invalid or the login was cancelled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                invalid-callback:
                  value:
                    type: https://boardtpl.dev/problems/invalid-auth-callback
                    title: Authentication callback is invalid.
                    status: 400
                    detail: The authorization state was missing, expired, or already used.
                    code: invalid_auth_callback
        '502':
          description: Keycloak token exchange failed upstream.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                keycloak-failure:
                  value:
                    type: https://boardtpl.dev/problems/keycloak-token-exchange-failed
                    title: Keycloak token exchange failed.
                    status: 502
                    detail: The authorization code is invalid.
                    code: keycloak_token_exchange_failed
  /identity/me:
    get:
      tags: [Identity]
      summary: Get current user profile
      operationId: getCurrentUserProfile
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
      responses:
        '200':
          description: User profile returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserResponse'
              examples:
                default:
                  value:
                    subject: 5cfdbb44-2cf9-4aa2-b411-6c25b6690c4c
                    displayName: Local Admin
                    email: admin@boardtpl.local
                    emailVerified: true
                    identityProvider: null
                    roles: [admin, developer, player]
        '401':
          $ref: '#/components/responses/UnauthorizedProblemResponse'
  /identity/me/profile:
    get:
      tags: [Identity]
      summary: Get application-managed profile details for the current user
      operationId: getMyUserProfile
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
      responses:
        '200':
          description: Profile details returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
              examples:
                default:
                  value:
                    profile:
                      subject: 5cfdbb44-2cf9-4aa2-b411-6c25b6690c4c
                      displayName: Board Enthusiast
                      userName: local-admin
                      firstName: Local
                      lastName: Admin
                      email: admin@boardtpl.local
                      emailVerified: true
                      avatarUrl: null
                      avatarDataUrl: data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAAB
                      initials: LA
                      updatedAt: '2026-03-04T19:45:00Z'
        '401':
          $ref: '#/components/responses/UnauthorizedProblemResponse'
    put:
      tags: [Identity]
      summary: Update application-managed profile display name for the current user
      operationId: updateMyUserProfile
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserProfileRequest'
            examples:
              default:
                value:
                  displayName: Board Enthusiast
      responses:
        '200':
          description: Profile details updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedProblemResponse'
        '422':
          description: Validation failed for the request payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationProblemDetails'
  /identity/me/profile/avatar-url:
    put:
      tags: [Identity]
      summary: Set a hosted avatar URL for the current user
      operationId: setMyAvatarUrl
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetAvatarUrlRequest'
            examples:
              default:
                value:
                  avatarUrl: https://cdn.example.com/avatars/boardfan.png
      responses:
        '200':
          description: Avatar URL saved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedProblemResponse'
        '422':
          description: Validation failed for the request payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationProblemDetails'
  /identity/me/profile/avatar-upload:
    post:
      tags: [Identity]
      summary: Upload an avatar image for the current user
      operationId: uploadMyAvatar
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UploadAvatarForm'
      responses:
        '200':
          description: Avatar uploaded successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedProblemResponse'
        '422':
          description: Validation failed for the request payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationProblemDetails'
  /identity/me/profile/avatar:
    delete:
      tags: [Identity]
      summary: Remove any configured avatar for the current user
      operationId: removeMyAvatar
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Avatar removed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedProblemResponse'
  /identity/me/developer-enrollment:
    get:
      tags: [Identity]
      summary: Get developer enrollment status for the current user
      operationId: getMyDeveloperEnrollment
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
      responses:
        '200':
          description: Developer enrollment status returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeveloperEnrollmentResponse'
              examples:
                not-requested:
                  value:
                    developerEnrollment:
                      requestId: null
                      status: not_requested
                      actionRequiredBy: none
                      developerAccessEnabled: false
                      canSubmitRequest: true
                      canCancelRequest: false
                      canReply: false
                      requestedAt: null
                      updatedAt: null
                      reviewedAt: null
                      reapplyAvailableAt: null
                      reviewerSubject: null
                pending-review:
                  value:
                    developerEnrollment:
                      requestId: 2c54f9bb-1fdf-48e5-8cf0-a8b77f6174af
                      status: pending_review
                      actionRequiredBy: moderator
                      developerAccessEnabled: false
                      canSubmitRequest: false
                      canCancelRequest: true
                      canReply: false
                      requestedAt: '2026-03-03T20:15:00Z'
                      updatedAt: '2026-03-03T20:15:00Z'
                      reviewedAt: null
                      reapplyAvailableAt: null
                      reviewerSubject: null
                awaiting-applicant:
                  value:
                    developerEnrollment:
                      requestId: 2c54f9bb-1fdf-48e5-8cf0-a8b77f6174af
                      status: awaiting_applicant_response
                      actionRequiredBy: applicant
                      developerAccessEnabled: false
                      canSubmitRequest: false
                      canCancelRequest: true
                      canReply: true
                      requestedAt: '2026-03-03T20:15:00Z'
                      updatedAt: '2026-03-03T21:05:00Z'
                      reviewedAt: null
                      reapplyAvailableAt: null
                      reviewerSubject: null
                approved:
                  value:
                    developerEnrollment:
                      requestId: 2c54f9bb-1fdf-48e5-8cf0-a8b77f6174af
                      status: approved
                      actionRequiredBy: none
                      developerAccessEnabled: true
                      canSubmitRequest: false
                      canCancelRequest: false
                      canReply: false
                      requestedAt: '2026-03-03T20:15:00Z'
                      updatedAt: '2026-03-03T21:05:00Z'
                      reviewedAt: '2026-03-03T21:05:00Z'
                      reapplyAvailableAt: null
                      reviewerSubject: moderator-123
                rejected:
                  value:
                    developerEnrollment:
                      requestId: 2c54f9bb-1fdf-48e5-8cf0-a8b77f6174af
                      status: rejected
                      actionRequiredBy: none
                      developerAccessEnabled: false
                      canSubmitRequest: false
                      canCancelRequest: false
                      canReply: false
                      requestedAt: '2026-03-03T20:15:00Z'
                      updatedAt: '2026-03-03T21:05:00Z'
                      reviewedAt: '2026-03-03T21:05:00Z'
                      reapplyAvailableAt: '2026-04-02T21:05:00Z'
                      reviewerSubject: moderator-123
        '401':
          $ref: '#/components/responses/UnauthorizedProblemResponse'
    post:
      tags: [Identity]
      summary: Submit a developer enrollment request for the current user
      operationId: enrollCurrentUserAsDeveloper
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
      responses:
        '200':
          description: Developer enrollment request state returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeveloperEnrollmentResponse'
              examples:
                requested:
                  value:
                    developerEnrollment:
                      requestId: 2c54f9bb-1fdf-48e5-8cf0-a8b77f6174af
                      status: pending_review
                      actionRequiredBy: moderator
                      developerAccessEnabled: false
                      canSubmitRequest: false
                      canCancelRequest: true
                      canReply: false
                      requestedAt: '2026-03-03T20:15:00Z'
                      updatedAt: '2026-03-03T20:15:00Z'
                      reviewedAt: null
                      reapplyAvailableAt: null
                      reviewerSubject: null
                already-pending:
                  value:
                    developerEnrollment:
                      requestId: 2c54f9bb-1fdf-48e5-8cf0-a8b77f6174af
                      status: pending_review
                      actionRequiredBy: moderator
                      developerAccessEnabled: false
                      canSubmitRequest: false
                      canCancelRequest: true
                      canReply: false
                      requestedAt: '2026-03-03T20:15:00Z'
                      updatedAt: '2026-03-03T20:15:00Z'
                      reviewedAt: null
                      reapplyAvailableAt: null
                      reviewerSubject: null
                already-approved:
                  value:
                    developerEnrollment:
                      requestId: 2c54f9bb-1fdf-48e5-8cf0-a8b77f6174af
                      status: approved
                      actionRequiredBy: none
                      developerAccessEnabled: true
                      canSubmitRequest: false
                      canCancelRequest: false
                      canReply: false
                      requestedAt: '2026-03-03T20:15:00Z'
                      updatedAt: '2026-03-03T21:05:00Z'
                      reviewedAt: '2026-03-03T21:05:00Z'
                      reapplyAvailableAt: null
                      reviewerSubject: moderator-123
                rejected:
                  value:
                    developerEnrollment:
                      requestId: 2c54f9bb-1fdf-48e5-8cf0-a8b77f6174af
                      status: rejected
                      actionRequiredBy: none
                      developerAccessEnabled: false
                      canSubmitRequest: true
                      canCancelRequest: false
                      canReply: false
                      requestedAt: '2026-03-03T20:15:00Z'
                      updatedAt: '2026-03-03T21:05:00Z'
                      reviewedAt: '2026-03-03T21:05:00Z'
                      reapplyAvailableAt: '2026-04-02T21:05:00Z'
                      reviewerSubject: moderator-123
                already-enabled-without-request:
                  value:
                    developerEnrollment:
                      requestId: null
                      status: approved
                      actionRequiredBy: none
                      developerAccessEnabled: true
                      canSubmitRequest: false
                      canCancelRequest: false
                      canReply: false
                      requestedAt: null
                      updatedAt: null
                      reviewedAt: null
                      reapplyAvailableAt: null
                      reviewerSubject: null
        '401':
          $ref: '#/components/responses/UnauthorizedProblemResponse'
  /identity/me/developer-enrollment/{requestId}/cancel:
    post:
      tags: [Identity]
      summary: Cancel the current user's open developer enrollment request
      operationId: cancelMyDeveloperEnrollment
      security:
        - BearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Developer enrollment request cancelled successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeveloperEnrollmentResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedProblemResponse'
        '404':
          description: Developer enrollment request not found.
        '409':
          description: Developer enrollment request cannot be cancelled in its current state.
  /identity/me/developer-enrollment/{requestId}/conversation:
    get:
      tags: [Identity]
      summary: Get conversation history for the current user's developer enrollment request
      operationId: getMyDeveloperEnrollmentConversation
      security:
        - BearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Developer enrollment conversation returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeveloperEnrollmentConversationResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedProblemResponse'
        '404':
          description: Developer enrollment request not found.
  /identity/me/developer-enrollment/{requestId}/messages:
    post:
      tags: [Identity]
      summary: Reply to a developer enrollment information request
      operationId: replyToMyDeveloperEnrollment
      security:
        - BearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ConversationMessageForm'
      responses:
        '200':
          description: Developer enrollment reply accepted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeveloperEnrollmentResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedProblemResponse'
        '404':
          description: Developer enrollment request not found.
        '409':
          description: Developer enrollment request is not waiting on an applicant reply.
        '422':
          description: Validation failed for the form payload.
  /identity/me/developer-enrollment/{requestId}/attachments/{attachmentId}:
    get:
      tags: [Identity]
      summary: Download an attachment from the current user's developer enrollment conversation
      operationId: downloadMyDeveloperEnrollmentAttachment
      security:
        - BearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: attachmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Attachment returned successfully.
        '401':
          $ref: '#/components/responses/UnauthorizedProblemResponse'
        '404':
          description: Attachment not found.
  /identity/me/notifications:
    get:
      tags: [Identity]
      summary: List in-app notifications for the current user
      operationId: listMyNotifications
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Notifications returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedProblemResponse'
  /identity/me/notifications/{notificationId}/read:
    post:
      tags: [Identity]
      summary: Mark an in-app notification as read
      operationId: markMyNotificationRead
      security:
        - BearerAuth: []
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Notification marked read successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedProblemResponse'
        '404':
          description: Notification not found.
  /moderation/developer-enrollment-requests:
    get:
      tags: [Moderation]
      summary: List developer enrollment requests
      operationId: listDeveloperEnrollmentRequests
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
      responses:
        '200':
          description: Developer enrollment requests returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeveloperEnrollmentRequestListResponse'
              examples:
                default:
                  value:
                    requests:
                      - requestId: 2c54f9bb-1fdf-48e5-8cf0-a8b77f6174af
                        applicantSubject: player-123
                        applicantDisplayName: Player One
                        applicantEmail: player1@boardtpl.local
                        status: pending_review
                        actionRequiredBy: moderator
                        developerAccessEnabled: false
                        requestedAt: '2026-03-03T20:15:00Z'
                        updatedAt: '2026-03-03T20:15:00Z'
                        reviewedAt: null
                        reapplyAvailableAt: null
                        reviewerSubject: null
                      - requestId: 6c286ce9-22f1-4eff-b25f-58ff0120f539
                        applicantSubject: player-456
                        applicantDisplayName: Player Two
                        applicantEmail: player2@boardtpl.local
                        status: approved
                        actionRequiredBy: none
                        developerAccessEnabled: true
                        requestedAt: '2026-03-02T18:10:00Z'
                        updatedAt: '2026-03-02T19:00:00Z'
                        reviewedAt: '2026-03-02T19:00:00Z'
                        reapplyAvailableAt: null
                        reviewerSubject: moderator-123
        '401':
          $ref: '#/components/responses/UnauthorizedProblemResponse'
        '403':
          description: Caller does not have moderator access.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                forbidden:
                  value:
