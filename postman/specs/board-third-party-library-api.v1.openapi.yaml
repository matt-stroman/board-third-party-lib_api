  /developer/titles/{titleId}/metadata/current:
    put:
      tags: [Catalog]
      summary: Update current title metadata
      description: >
        Updates the current metadata revision while a title is still `draft`.
        Once the title has left draft, this operation preserves history by
        creating a new metadata revision and activating it.
      operationId: upsertCurrentTitleMetadata
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
        - name: titleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Title identifier.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertTitleMetadataRequest'
      responses:
        '200':
          description: Current metadata updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeveloperTitleResponse'
