openapi: 3.0.3
info:
  title: Board Third Party Library API
  version: 1.0.0-draft
  description: >
    Contract-first API definition for the Board Third Party Library.
    Authentication is delegated to Keycloak, so custom password,
    registration, email-verification, refresh-token, and external-identity
    management endpoints have been removed from this contract. Application-owned
    Wave 1 persistence now includes a local user projection plus optional Board
    profile linkage/cache.
servers:
  - url: http://localhost:5085
    description: Local backend
tags:
  - name: Health
    description: Service metadata and health endpoints.
  - name: PlatformRoles
    description: Global platform roles.
  - name: Identity
    description: Keycloak-backed auth and current-user identity endpoints.
  - name: Organizations
    description: Public organization pages and authenticated organization management endpoints.
paths:
  /:
    get:
      tags: [Health]
      summary: Get API metadata
      operationId: getApiMetadata
      responses:
        '200':
          description: API metadata returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiMetadataResponse'
              examples:
                default:
                  value:
                    service: board-third-party-lib-backend
                    endpoints: [/health/live, /health/ready]
  /health/live:
    get:
      tags: [Health]
      summary: Liveness health check
      operationId: getLivenessHealth
      responses:
        '200':
          description: API process is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                healthy:
                  value:
                    status: Healthy
                    checks: []
                    durationMs: 0.2149
  /health/ready:
    get:
      tags: [Health]
      summary: Readiness health check
      operationId: getReadinessHealth
      parameters:
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
      responses:
        '200':
          description: API is ready and dependencies are healthy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                healthy:
                  value:
                    status: Healthy
                    checks:
                      - name: postgres
                        status: Healthy
                        description: PostgreSQL connection succeeded.
                        data:
                          database: board_tpl
                          user: board_tpl_user
                    durationMs: 6.1373
        '503':
          description: API is running but not ready due to dependency failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                postgres-unhealthy:
                  value:
                    status: Unhealthy
                    checks:
                      - name: postgres
                        status: Unhealthy
                        description: PostgreSQL connection failed.
                    durationMs: 12.551
  /identity/roles:
    get:
      tags: [PlatformRoles]
      summary: List platform roles
      operationId: listPlatformRoles
      responses:
        '200':
          description: Platform roles returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformRoleListResponse'
              examples:
                default:
                  value:
                    roles:
                      - code: player
                        displayName: Player
                        scope: platform
                      - code: developer
                        displayName: Developer
                        scope: platform
                      - code: admin
                        displayName: Admin
                        scope: platform
                      - code: moderator
                        displayName: Moderator
                        scope: platform
  /identity/auth/config:
    get:
      tags: [Identity]
      summary: Get authentication configuration
      operationId: getAuthenticationConfiguration
      responses:
        '200':
          description: Keycloak/OpenID Connect configuration returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationConfigurationResponse'
              examples:
                local:
                  value:
                    issuer: http://localhost:8080/realms/board-third-party-library/
                    authorizationEndpoint: http://localhost:8080/realms/board-third-party-library/protocol/openid-connect/auth
                    tokenEndpoint: http://localhost:8080/realms/board-third-party-library/protocol/openid-connect/token
                    logoutEndpoint: http://localhost:8080/realms/board-third-party-library/protocol/openid-connect/logout
                    jwksUri: http://localhost:8080/realms/board-third-party-library/protocol/openid-connect/certs
                    accountManagementUrl: http://localhost:8080/realms/board-third-party-library/account
                    clientId: board-third-party-library-backend
                    callbackUrl: http://localhost:5085/identity/auth/callback
                    scopes: [openid, profile, email]
                    registrationEnabled: true
                    externalIdentityProviders: []
  /identity/auth/login:
    get:
      tags: [Identity]
      summary: Start browser login with Keycloak
      operationId: startBrowserLogin
      parameters:
        - name: provider
          in: query
          required: false
          schema:
            type: string
          description: Optional Keycloak identity provider alias.
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
      responses:
        '302':
          description: Redirects the caller to Keycloak.
          headers:
            Location:
              schema:
                type: string
                format: uri
              example: http://localhost:8080/realms/board-third-party-library/protocol/openid-connect/auth?client_id=board-third-party-library-backend&redirect_uri=http%3A%2F%2Flocalhost%3A5085%2Fidentity%2Fauth%2Fcallback&response_type=code&scope=openid%20profile%20email&state=st_mock_123&code_challenge=pkce_mock_123&code_challenge_method=S256
  /identity/auth/callback:
    get:
      tags: [Identity]
      summary: Complete browser login callback
      operationId: completeBrowserLoginCallback
      parameters:
        - name: code
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
        - name: error
          in: query
          schema:
            type: string
        - name: error_description
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
      responses:
        '200':
          description: Keycloak code exchange succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationCallbackResponse'
              examples:
                success:
                  value:
                    accessToken: eyJhbGciOi...mock-access-token
                    refreshToken: eyJhbGciOi...mock-refresh-token
                    idToken: eyJhbGciOi...mock-id-token
                    tokenType: Bearer
                    expiresInSeconds: 300
                    scope: openid profile email
                    user:
                      subject: 5cfdbb44-2cf9-4aa2-b411-6c25b6690c4c
                      displayName: Local Admin
                      email: admin@boardtpl.local
                      emailVerified: true
                      identityProvider: null
                      roles: [admin, developer, player]
        '400':
          description: Callback arguments were invalid or the login was cancelled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                invalid-callback:
                  value:
                    type: https://boardtpl.dev/problems/invalid-auth-callback
                    title: Authentication callback is invalid.
                    status: 400
                    detail: The authorization state was missing, expired, or already used.
                    code: invalid_auth_callback
        '502':
          description: Keycloak token exchange failed upstream.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                keycloak-failure:
                  value:
                    type: https://boardtpl.dev/problems/keycloak-token-exchange-failed
                    title: Keycloak token exchange failed.
                    status: 502
                    detail: The authorization code is invalid.
                    code: keycloak_token_exchange_failed
  /identity/me:
    get:
      tags: [Identity]
      summary: Get current user profile
      operationId: getCurrentUserProfile
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
      responses:
        '200':
          description: User profile returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserResponse'
              examples:
                default:
                  value:
                    subject: 5cfdbb44-2cf9-4aa2-b411-6c25b6690c4c
                    displayName: Local Admin
                    email: admin@boardtpl.local
                    emailVerified: true
                    identityProvider: null
                    roles: [admin, developer, player]
        '401':
          $ref: '#/components/responses/UnauthorizedProblemResponse'
  /identity/me/board-profile:
    get:
      tags: [Identity]
      summary: Get linked Board profile
      operationId: getMyBoardProfile
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
      responses:
        '200':
          description: Linked Board profile returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BoardProfileResponse'
              examples:
                default:
                  value:
                    boardProfile:
                      boardUserId: board_user_12345
                      displayName: BoardKiddo
                      avatarUrl: https://cdn.board.fun/users/board_user_12345/avatar.png
                      linkedAt: '2026-03-01T18:00:00Z'
                      lastSyncedAt: '2026-03-01T18:00:00Z'
        '401':
          $ref: '#/components/responses/UnauthorizedProblemResponse'
        '404':
          description: No linked Board profile exists for the current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                not-linked:
                  value:
                    type: https://boardtpl.dev/problems/board-profile-not-linked
                    title: Board profile not linked
                    status: 404
                    detail: No linked Board profile exists for the current user.
                    code: board_profile_not_linked
    put:
      tags: [Identity]
      summary: Link or update Board profile
      operationId: upsertMyBoardProfile
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertBoardProfileRequest'
            examples:
              default:
                value:
                  boardUserId: board_user_12345
                  displayName: BoardKiddo
                  avatarUrl: https://cdn.board.fun/users/board_user_12345/avatar.png
      responses:
        '200':
          description: Board profile linked or updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BoardProfileResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedProblemResponse'
        '422':
          description: Validation failed for the request payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationProblemDetails'
              examples:
                validation:
                  value:
                    title: One or more validation errors occurred.
                    status: 422
                    errors:
                      boardUserId: [Board user ID is required.]
                      displayName: [Display name is required.]
    delete:
      tags: [Identity]
      summary: Unlink Board profile
      operationId: deleteMyBoardProfile
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
      responses:
        '204':
          description: Board profile unlinked successfully.
        '401':
          $ref: '#/components/responses/UnauthorizedProblemResponse'
        '404':
          description: No linked Board profile exists for the current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                not-linked:
                  value:
                    type: https://boardtpl.dev/problems/board-profile-not-linked
                    title: Board profile not linked
                    status: 404
                    detail: No linked Board profile exists for the current user.
                    code: board_profile_not_linked
  /organizations:
    get:
      tags: [Organizations]
      summary: List public organizations
      operationId: listOrganizations
      responses:
        '200':
          description: Public organizations returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationListResponse'
              examples:
                default:
                  value:
                    organizations:
                      - id: 11111111-1111-1111-1111-111111111111
                        slug: stellar-forge
                        displayName: Stellar Forge
                        description: Family co-op studio.
                        logoUrl: https://cdn.example.com/orgs/stellar-forge.png
                      - id: 22222222-2222-2222-2222-222222222222
                        slug: tabletop-sparks
                        displayName: Tabletop Sparks
                        description: Party game makers.
                        logoUrl: null
    post:
      tags: [Organizations]
      summary: Create organization
      operationId: createOrganization
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrganizationRequest'
            examples:
              default:
                value:
                  slug: stellar-forge
                  displayName: Stellar Forge
                  description: Family co-op studio.
                  logoUrl: https://cdn.example.com/orgs/stellar-forge.png
      responses:
        '201':
          description: Organization created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'
              examples:
                default:
                  value:
                    organization:
                      id: 11111111-1111-1111-1111-111111111111
                      slug: stellar-forge
                      displayName: Stellar Forge
                      description: Family co-op studio.
                      logoUrl: https://cdn.example.com/orgs/stellar-forge.png
                      createdAt: '2026-03-01T20:00:00Z'
                      updatedAt: '2026-03-01T20:00:00Z'
        '401':
          $ref: '#/components/responses/UnauthorizedProblemResponse'
        '403':
          description: Caller does not have permission to create organizations.
        '409':
          description: Organization slug is already in use.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                slug-conflict:
                  value:
                    type: https://boardtpl.dev/problems/organization-slug-conflict
                    title: Organization already exists
                    status: 409
                    detail: The supplied organization slug is already in use.
                    code: organization_slug_conflict
        '422':
          description: Validation failed for the request payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationProblemDetails'
              examples:
                validation:
                  value:
                    title: One or more validation errors occurred.
                    status: 422
                    errors:
                      slug: [Slug must contain only lowercase letters, numbers, and single hyphen separators.]
                      displayName: [Display name is required.]
                      logoUrl: [Logo URL must be an absolute URI.]
  /organizations/{slug}:
    get:
      tags: [Organizations]
      summary: Get public organization details
      operationId: getOrganizationBySlug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Human-readable organization route key.
      responses:
        '200':
          description: Organization details returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'
              examples:
                default:
                  value:
                    organization:
                      id: 11111111-1111-1111-1111-111111111111
                      slug: stellar-forge
                      displayName: Stellar Forge
                      description: Family co-op studio.
                      logoUrl: https://cdn.example.com/orgs/stellar-forge.png
                      createdAt: '2026-03-01T20:00:00Z'
                      updatedAt: '2026-03-01T20:00:00Z'
        '404':
          description: Organization not found.
  /developer/organizations/{organizationId}:
    put:
      tags: [Organizations]
      summary: Update organization
      operationId: updateOrganization
      security:
        - BearerAuth: []
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Organization identifier.
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrganizationRequest'
            examples:
              default:
                value:
                  slug: stellar-forge-studio
                  displayName: Stellar Forge Studio
                  description: Updated studio description.
                  logoUrl: https://cdn.example.com/orgs/stellar-forge-studio.png
      responses:
        '200':
          description: Organization updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedProblemResponse'
        '403':
          description: Caller does not have permission to manage this organization.
        '404':
          description: Organization not found.
        '409':
          description: Organization slug is already in use.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '422':
          description: Validation failed for the request payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationProblemDetails'
    delete:
      tags: [Organizations]
      summary: Delete organization
      operationId: deleteOrganization
      security:
        - BearerAuth: []
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Organization identifier.
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
      responses:
        '204':
          description: Organization deleted successfully.
        '401':
          $ref: '#/components/responses/UnauthorizedProblemResponse'
        '403':
          description: Caller does not have permission to delete this organization.
        '404':
          description: Organization not found.
  /developer/organizations/{organizationId}/memberships:
    get:
      tags: [Organizations]
      summary: List organization memberships
      operationId: listOrganizationMemberships
      security:
        - BearerAuth: []
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Organization identifier.
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
      responses:
        '200':
          description: Organization memberships returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationMembershipListResponse'
              examples:
                default:
                  value:
                    memberships:
                      - organizationId: 11111111-1111-1111-1111-111111111111
                        keycloakSubject: owner-123
                        displayName: Owner User
                        email: owner@boardtpl.local
                        role: owner
                        joinedAt: '2026-03-01T20:00:00Z'
                        updatedAt: '2026-03-01T20:00:00Z'
                      - organizationId: 11111111-1111-1111-1111-111111111111
                        keycloakSubject: editor-456
                        displayName: Editor User
                        email: editor@boardtpl.local
                        role: editor
                        joinedAt: '2026-03-01T20:05:00Z'
                        updatedAt: '2026-03-01T20:05:00Z'
        '401':
          $ref: '#/components/responses/UnauthorizedProblemResponse'
        '403':
          description: Caller does not have permission to view memberships for this organization.
        '404':
          description: Organization not found.
  /developer/organizations/{organizationId}/memberships/{memberKeycloakSubject}:
    put:
      tags: [Organizations]
      summary: Add or update organization membership
      operationId: upsertOrganizationMembership
      security:
        - BearerAuth: []
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Organization identifier.
        - name: memberKeycloakSubject
          in: path
          required: true
          schema:
            type: string
          description: Target user Keycloak subject.
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertOrganizationMembershipRequest'
            examples:
              default:
                value:
                  role: editor
      responses:
        '200':
          description: Organization membership created or updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationMembershipResponse'
              examples:
                default:
                  value:
                    membership:
                      organizationId: 11111111-1111-1111-1111-111111111111
                      keycloakSubject: editor-456
                      displayName: Editor User
                      email: editor@boardtpl.local
                      role: editor
                      joinedAt: '2026-03-01T20:05:00Z'
                      updatedAt: '2026-03-01T20:05:00Z'
        '401':
          $ref: '#/components/responses/UnauthorizedProblemResponse'
        '403':
          description: Caller does not have permission to manage memberships for this organization.
        '404':
          description: Organization or target user not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                target-user-not-found:
                  value:
                    type: https://boardtpl.dev/problems/organization-member-target-not-found
                    title: Target user not found
                    status: 404
                    detail: No local user projection exists for the supplied Keycloak subject.
                    code: organization_member_target_not_found
        '409':
          description: Membership change would remove the last owner.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                owner-conflict:
                  value:
                    type: https://boardtpl.dev/problems/organization-last-owner-conflict
                    title: Organization owner conflict
                    status: 409
                    detail: The last organization owner cannot be removed or downgraded.
                    code: organization_last_owner_conflict
        '422':
          description: Validation failed for the request payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationProblemDetails'
    delete:
      tags: [Organizations]
      summary: Remove organization membership
      operationId: deleteOrganizationMembership
      security:
        - BearerAuth: []
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Organization identifier.
        - name: memberKeycloakSubject
          in: path
          required: true
          schema:
            type: string
          description: Target user Keycloak subject.
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
      responses:
        '204':
          description: Organization membership removed successfully.
        '401':
          $ref: '#/components/responses/UnauthorizedProblemResponse'
        '403':
          description: Caller does not have permission to manage memberships for this organization.
        '404':
          description: Organization or membership not found.
        '409':
          description: Membership removal would remove the last owner.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                owner-conflict:
                  value:
                    type: https://boardtpl.dev/problems/organization-last-owner-conflict
                    title: Organization owner conflict
                    status: 409
                    detail: The last organization owner cannot be removed or downgraded.
                    code: organization_last_owner_conflict
components:
  parameters:
    PostmanMockResponseCodeHeader:
      name: x-mock-response-code
      in: header
      required: false
      schema:
        type: integer
      description: Postman mock-only header used to force a saved example by status code.
    PostmanMockResponseNameHeader:
      name: x-mock-response-name
      in: header
      required: false
      schema:
        type: string
      description: Postman mock-only header used to force a saved example by example name.
  responses:
    UnauthorizedProblemResponse:
      description: Caller is not authenticated.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            unauthorized:
              value:
                type: https://boardtpl.dev/problems/unauthorized
                title: Unauthorized
                status: 401
                detail: A valid bearer token is required.
                code: unauthorized
  schemas:
    ApiMetadataResponse:
      type: object
      required: [service, endpoints]
      properties:
        service:
          type: string
        endpoints:
          type: array
          items:
            type: string
    HealthCheckEntry:
      type: object
      required: [name, status]
      properties:
        name:
          type: string
        status:
          type: string
        description:
          type: string
          nullable: true
        data:
          type: object
          nullable: true
          additionalProperties: true
    HealthResponse:
      type: object
      required: [status, checks, durationMs]
      properties:
        status:
          type: string
        checks:
          type: array
          items:
            $ref: '#/components/schemas/HealthCheckEntry'
        durationMs:
          type: number
          format: double
    PlatformRoleDefinition:
      type: object
      required: [code, displayName, scope]
      properties:
        code:
          type: string
        displayName:
          type: string
        scope:
          type: string
    PlatformRoleListResponse:
      type: object
      required: [roles]
      properties:
        roles:
          type: array
          items:
            $ref: '#/components/schemas/PlatformRoleDefinition'
    AuthenticationConfigurationResponse:
      type: object
      required: [issuer, authorizationEndpoint, tokenEndpoint, logoutEndpoint, jwksUri, accountManagementUrl, clientId, callbackUrl, scopes, registrationEnabled, externalIdentityProviders]
      properties:
