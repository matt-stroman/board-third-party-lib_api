components:
  parameters:
    PostmanMockResponseCodeHeader:
      name: x-mock-response-code
      in: header
      required: false
      schema:
        type: string
      description: >
        Postman mock-only header used to force a specific saved example by HTTP status code during
        mock validation runs. Production backends should ignore this header.
    PostmanMockResponseNameHeader:
      name: x-mock-response-name
      in: header
      required: false
      schema:
        type: string
      description: >
        Postman mock-only header used to force a specific saved example by example name during
        mock validation runs. Production backends should ignore this header.
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        End-user access token for authenticated identity operations (for example `/identity/me/*`).
        Public/native UI applications should use an OAuth-style flow with PKCE; do not embed a
        client secret in distributed clients.
  responses:
    UnauthorizedProblemResponse:
      description: Missing, invalid, or expired bearer access token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            unauthorized:
              summary: Bearer token is missing or invalid
              value:
                type: https://boardtpl.dev/problems/unauthorized
                title: Unauthorized
                status: 401
                detail: A valid bearer access token is required.
                code: unauthorized
    ForbiddenProblemResponse:
      description: Authenticated caller is not allowed to perform this action.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            forbidden:
              summary: Caller is authenticated but not permitted
              value:
                type: https://boardtpl.dev/problems/forbidden
                title: Forbidden
                status: 403
                detail: You are not permitted to perform this action.
                code: forbidden
    TooManyRequestsProblemResponse:
      description: Too many requests for this operation. Retry after the cooldown window.
      headers:
        Retry-After:
          description: Number of seconds to wait before retrying.
          schema:
            type: integer
            format: int32
            example: 60
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            rate-limited:
              summary: Operation rate limited
              value:
                type: https://boardtpl.dev/problems/rate-limit-exceeded
                title: Too Many Requests
                status: 429
                detail: Too many requests were made for this operation. Retry after the cooldown period.
                code: rate_limit_exceeded
  schemas:
    ApiMetadataResponse:
      type: object
      required:
        - service
        - endpoints
      properties:
        service:
          type: string
          example: board-third-party-lib-backend
        endpoints:
          type: array
          items:
            type: string
          example:
            - /health/live
            - /health/ready
    HealthResponse:
      type: object
      required:
        - status
        - checks
        - durationMs
      properties:
        status:
          type: string
          description: Overall health status of the endpoint response.
          enum:
            - Healthy
            - Degraded
            - Unhealthy
        checks:
          type: array
          items:
            $ref: '#/components/schemas/HealthCheckEntry'
        durationMs:
          type: number
          format: double
          description: Total duration of the health check execution in milliseconds.
    HealthCheckEntry:
      type: object
      required:
        - name
        - status
      properties:
        name:
          type: string
          example: postgres
        status:
          type: string
          enum:
            - Healthy
            - Degraded
            - Unhealthy
        description:
          type: string
          nullable: true
        data:
          type: object
          nullable: true
          additionalProperties: true
    PlatformRoleSummary:
      type: object
      required:
        - code
        - displayName
        - scope
      properties:
        code:
          type: string
          example: developer
        displayName:
          type: string
          example: Developer
        scope:
          type: string
          enum:
            - platform
    PlatformRoleListResponse:
      type: object
      required:
        - roles
      properties:
        roles:
          type: array
          items:
            $ref: '#/components/schemas/PlatformRoleSummary'
    RegisterEmailRequest:
      type: object
      required:
        - email
        - password
        - displayName
        - requestedRoleCodes
      properties:
        email:
          type: string
          format: email
          example: alex@example.com
        password:
          type: string
          format: password
          minLength: 8
          example: StrongPassword!123
        displayName:
          type: string
          minLength: 1
          example: Alex Rivers
        requestedRoleCodes:
          type: array
          minItems: 1
          items:
            type: string
            example: player
          example:
            - player
            - developer
    AddUserEmailAddressRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          example: alex.rivers@example.com
    VerifyUserEmailAddressRequest:
      type: object
      required:
        - code
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 32
          example: '482913'
    RegisteredUserSummary:
      type: object
      required:
        - id
        - displayName
        - status
        - roles
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
        status:
          type: string
          enum:
            - active
            - disabled
        roles:
          type: array
          items:
            type: string
    UserEmailAddressSummary:
      type: object
      required:
        - id
        - email
        - verified
        - isPrimary
        - status
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        verified:
          type: boolean
        isPrimary:
          type: boolean
        status:
          type: string
          enum:
            - pending_verification
            - active
            - retired
    RegisterEmailResponse:
      type: object
      required:
        - user
        - primaryEmail
      properties:
        user:
          $ref: '#/components/schemas/RegisteredUserSummary'
        primaryEmail:
          $ref: '#/components/schemas/UserEmailAddressSummary'
    AddUserEmailAddressResponse:
      type: object
      required:
        - emailAddress
      properties:
        emailAddress:
          $ref: '#/components/schemas/UserEmailAddressSummary'
    UserEmailVerificationChallengeSummary:
      type: object
      required:
        - emailAddressId
        - deliveryChannel
        - destinationHint
        - status
        - expiresAt
        - resendAvailableAt
      properties:
        emailAddressId:
          type: string
          format: uuid
        deliveryChannel:
          type: string
          enum:
            - email
        destinationHint:
          type: string
          description: Masked delivery destination shown to the user.
          example: a***@example.com
        status:
          type: string
          enum:
            - sent
            - queued
        expiresAt:
          type: string
          format: date-time
        resendAvailableAt:
          type: string
          format: date-time
    SendUserEmailVerificationChallengeResponse:
      type: object
      required:
        - verificationChallenge
      properties:
        verificationChallenge:
          $ref: '#/components/schemas/UserEmailVerificationChallengeSummary'
    VerifyUserEmailAddressResponse:
      type: object
      required:
        - emailAddress
      properties:
        emailAddress:
          $ref: '#/components/schemas/UserEmailAddressSummary'
    UserEmailAddressListResponse:
      type: object
      required:
        - emailAddresses
      properties:
        emailAddresses:
          type: array
          items:
            $ref: '#/components/schemas/UserEmailAddressSummary'
    CurrentUserProfileResponse:
      type: object
      required:
        - user
        - primaryEmail
      properties:
        user:
          $ref: '#/components/schemas/RegisteredUserSummary'
        primaryEmail:
          $ref: '#/components/schemas/UserEmailAddressSummary'
    LoginWithEmailRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: alex@example.com
        password:
          type: string
          format: password
          minLength: 1
          example: StrongPassword!123
    RefreshAuthTokensRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          minLength: 1
          example: rft_mock_1234567890
    LogoutRequest:
      type: object
      properties:
        refreshToken:
          type: string
          nullable: true
          example: rft_mock_1234567890
          description: >
            Optional refresh token to revoke. When omitted, the backend may infer the current session from
            bearer/session context depending on implementation.
        scope:
          type: string
          enum:
            - current_session
            - all_sessions
          default: current_session
          description: >
            Logout scope. `current_session` revokes only the current session/refresh token. `all_sessions`
            revokes all refresh-token/session state for the authenticated user.
    ChangePasswordRequest:
      type: object
      required:
        - currentPassword
        - newPassword
      properties:
        currentPassword:
          type: string
          format: password
          minLength: 1
        newPassword:
          type: string
          format: password
          minLength: 8
    ForgotPasswordRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          example: alex@example.com
    ResetPasswordRequest:
      type: object
      required:
        - email
        - resetToken
        - newPassword
      properties:
        email:
          type: string
          format: email
        resetToken:
          type: string
          minLength: 1
          example: prt_mock_482913
        newPassword:
          type: string
          format: password
          minLength: 8
    AcceptedActionResponse:
      type: object
      required:
        - accepted
        - message
      properties:
        accepted:
          type: boolean
          example: true
        message:
          type: string
          example: Request accepted for processing.
    ExternalIdentitySummary:
      type: object
      required:
        - id
        - provider
        - providerUserId
        - providerDisplayName
        - linkedAt
      properties:
        id:
          type: string
          format: uuid
        provider:
          type: string
          description: External provider code (non-Board; use the dedicated Board profile endpoints for Board linkage).
          example: github
        providerUserId:
          type: string
          example: '12345678'
        providerDisplayName:
          type: string
          example: alexrivers
        linkedAt:
          type: string
          format: date-time
    ExternalIdentityListResponse:
      type: object
      required:
        - externalIdentities
      properties:
        externalIdentities:
          type: array
          items:
            $ref: '#/components/schemas/ExternalIdentitySummary'
    LinkExternalIdentityRequest:
      type: object
      required:
        - provider
        - authorizationCode
        - redirectUri
        - state
      properties:
        provider:
          type: string
          description: External provider code (for example `github`, `steam`, `epic`; not `board`).
          example: github
        authorizationCode:
          type: string
          minLength: 1
          example: gh_oauth_code_mock_123
        redirectUri:
          type: string
          format: uri
          example: boardtpl://auth/callback
        state:
          type: string
          minLength: 1
          example: st_mock_123
    LinkExternalIdentityResponse:
      type: object
      required:
        - externalIdentity
      properties:
        externalIdentity:
          $ref: '#/components/schemas/ExternalIdentitySummary'
    BoardProfileLinkSummary:
      type: object
      required:
        - boardUserId
        - boardDisplayName
        - linkedAt
      properties:
        boardUserId:
          type: string
          example: board_user_abc123
        boardDisplayName:
          type: string
          example: Alex Rivers
        boardHandle:
          type: string
          nullable: true
          example: alexrivers
        linkedAt:
          type: string
          format: date-time
        lastSyncedAt:
          type: string
          format: date-time
          nullable: true
    BoardProfileLinkResponse:
      type: object
      required:
        - boardProfile
      properties:
        boardProfile:
          $ref: '#/components/schemas/BoardProfileLinkSummary'
    UpsertBoardProfileLinkRequest:
      type: object
      required:
        - boardUserId
        - boardDisplayName
      properties:
        boardUserId:
          type: string
          minLength: 1
          example: board_user_abc123
        boardDisplayName:
          type: string
          minLength: 1
          example: Alex Rivers
        boardHandle:
          type: string
          nullable: true
          example: alexrivers
    AuthTokenPairResponse:
      type: object
      required:
        - tokenType
        - accessToken
        - accessTokenExpiresInSeconds
        - refreshToken
        - refreshTokenExpiresAt
        - user
      properties:
        tokenType:
          type: string
          example: Bearer
          description: HTTP authorization scheme for the access token.
        accessToken:
          type: string
          example: eyJhbGciOi...mock-access-token
          description: Bearer access token for authenticated API requests.
        accessTokenExpiresInSeconds:
          type: integer
          format: int32
          example: 3600
          description: Access token lifetime in seconds from issuance time.
        refreshToken:
          type: string
          example: rft_mock_1234567890
          description: >
            Refresh token used to obtain a new token pair. On refresh, clients should replace any previously
            stored refresh token with the newly returned token.
        refreshTokenExpiresAt:
          type: string
          format: date-time
          description: Absolute UTC expiration timestamp for the refresh token.
        user:
          $ref: '#/components/schemas/RegisteredUserSummary'
    ProblemDetails:
      type: object
      required:
        - title
        - status
      properties:
        type:
          type: string
          format: uri
          nullable: true
        title:
          type: string
        status:
          type: integer
          format: int32
        detail:
          type: string
          nullable: true
        code:
          type: string
          nullable: true
    ValidationProblemDetails:
      allOf:
        - $ref: '#/components/schemas/ProblemDetails'
        - type: object
          required:
            - errors
          properties:
            errors:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
