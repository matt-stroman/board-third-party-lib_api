        '404':
          description: Title or metadata revision not found.
components:
  parameters:
    PostmanMockResponseCodeHeader:
      name: x-mock-response-code
      in: header
      required: false
      schema:
        type: integer
      description: Postman mock-only header used to force a saved example by status code.
    PostmanMockResponseNameHeader:
      name: x-mock-response-name
      in: header
      required: false
      schema:
        type: string
      description: Postman mock-only header used to force a saved example by example name.
  responses:
    UnauthorizedProblemResponse:
      description: Caller is not authenticated.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            unauthorized:
              value:
                type: https://boardtpl.dev/problems/unauthorized
                title: Unauthorized
                status: 401
                detail: A valid bearer token is required.
                code: unauthorized
  schemas:
    ApiMetadataResponse:
      type: object
      required: [service, endpoints]
      properties:
        service:
          type: string
        endpoints:
          type: array
          items:
            type: string
    HealthCheckEntry:
      type: object
      required: [name, status]
      properties:
        name:
          type: string
        status:
          type: string
        description:
          type: string
          nullable: true
        data:
          type: object
          nullable: true
          additionalProperties: true
    HealthResponse:
      type: object
      required: [status, checks, durationMs]
      properties:
        status:
          type: string
        checks:
          type: array
          items:
            $ref: '#/components/schemas/HealthCheckEntry'
        durationMs:
          type: number
          format: double
    PlatformRoleDefinition:
      type: object
      required: [code, displayName, scope]
      properties:
        code:
          type: string
        displayName:
          type: string
        scope:
          type: string
    PlatformRoleListResponse:
      type: object
      required: [roles]
      properties:
        roles:
          type: array
          items:
            $ref: '#/components/schemas/PlatformRoleDefinition'
    AuthenticationConfigurationResponse:
      type: object
      required: [issuer, authorizationEndpoint, tokenEndpoint, logoutEndpoint, jwksUri, accountManagementUrl, clientId, callbackUrl, scopes, registrationEnabled, externalIdentityProviders]
      properties:
        issuer:
          type: string
          format: uri
        authorizationEndpoint:
          type: string
          format: uri
        tokenEndpoint:
          type: string
          format: uri
        logoutEndpoint:
          type: string
          format: uri
        jwksUri:
          type: string
          format: uri
        accountManagementUrl:
          type: string
          format: uri
        clientId:
          type: string
        callbackUrl:
          type: string
          format: uri
        scopes:
          type: array
          items:
            type: string
        registrationEnabled:
          type: boolean
        externalIdentityProviders:
          type: array
          items:
            type: string
    AuthenticationCallbackResponse:
      type: object
      required: [accessToken, tokenType, expiresInSeconds, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
          nullable: true
        idToken:
          type: string
          nullable: true
        tokenType:
          type: string
        expiresInSeconds:
          type: integer
          format: int32
        scope:
          type: string
          nullable: true
        user:
          $ref: '#/components/schemas/CurrentUserResponse'
    CurrentUserResponse:
      type: object
      required: [subject, displayName, emailVerified, roles]
      properties:
        subject:
          type: string
        displayName:
          type: string
        email:
          type: string
          format: email
          nullable: true
        emailVerified:
          type: boolean
        identityProvider:
          type: string
          nullable: true
        roles:
          type: array
          items:
            type: string
    BoardProfile:
      type: object
      required: [boardUserId, displayName, linkedAt, lastSyncedAt]
      properties:
        boardUserId:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: string
          format: uri
          nullable: true
        linkedAt:
          type: string
          format: date-time
        lastSyncedAt:
          type: string
          format: date-time
    BoardProfileResponse:
      type: object
      required: [boardProfile]
      properties:
        boardProfile:
          $ref: '#/components/schemas/BoardProfile'
    UpsertBoardProfileRequest:
      type: object
      required: [boardUserId, displayName]
      properties:
        boardUserId:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: string
          format: uri
          nullable: true
    OrganizationSummary:
      type: object
      required: [id, slug, displayName]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        displayName:
          type: string
        description:
          type: string
          nullable: true
        logoUrl:
          type: string
          format: uri
          nullable: true
    Organization:
      allOf:
        - $ref: '#/components/schemas/OrganizationSummary'
        - type: object
          required: [createdAt, updatedAt]
          properties:
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
    OrganizationListResponse:
      type: object
      required: [organizations]
      properties:
        organizations:
          type: array
          items:
            $ref: '#/components/schemas/OrganizationSummary'
    OrganizationResponse:
      type: object
      required: [organization]
      properties:
        organization:
          $ref: '#/components/schemas/Organization'
    CreateOrganizationRequest:
      type: object
      required: [slug, displayName]
      properties:
        slug:
          type: string
        displayName:
          type: string
        description:
          type: string
          nullable: true
        logoUrl:
          type: string
          format: uri
          nullable: true
    UpdateOrganizationRequest:
      allOf:
        - $ref: '#/components/schemas/CreateOrganizationRequest'
    OrganizationMembership:
      type: object
      required: [organizationId, keycloakSubject, role, joinedAt, updatedAt]
      properties:
        organizationId:
          type: string
          format: uuid
        keycloakSubject:
          type: string
        displayName:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        role:
          type: string
        joinedAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    OrganizationMembershipListResponse:
      type: object
      required: [memberships]
      properties:
        memberships:
          type: array
          items:
            $ref: '#/components/schemas/OrganizationMembership'
    OrganizationMembershipResponse:
      type: object
      required: [membership]
      properties:
        membership:
          $ref: '#/components/schemas/OrganizationMembership'
    UpsertOrganizationMembershipRequest:
      type: object
      required: [role]
      properties:
        role:
          type: string
    TitleContentKind:
      type: string
      description: Stable type classification for a title.
      enum: [game, app]
    TitleLifecycleStatus:
      type: string
      description: >
        Catalog lifecycle state. Draft titles are developer-only, testing
        titles support controlled public exposure, published titles are
        officially public, and archived titles are no longer active.
      enum: [draft, testing, published, archived]
    TitleVisibility:
      type: string
      description: >
        Public discoverability mode independent of lifecycle state. `listed`
        titles appear in browse results, `unlisted` titles are direct-link
        only, and `private` titles are not publicly reachable.
      enum: [private, unlisted, listed]
    TitleMetadataInput:
      type: object
      description: Player-facing metadata payload for a title revision.
      required: [displayName, shortDescription, description, genreDisplay, minPlayers, maxPlayers, ageRatingAuthority, ageRatingValue, minAgeYears]
      properties:
        displayName:
          type: string
          description: Public display name for the title.
        shortDescription:
          type: string
          description: Short catalog summary suitable for cards and lists.
        description:
          type: string
          description: Full catalog description.
        genreDisplay:
          type: string
          description: Display-oriented genre text; normalized taxonomy is deferred.
        minPlayers:
          type: integer
          format: int32
          description: Minimum supported player count.
        maxPlayers:
          type: integer
          format: int32
          description: Maximum supported player count.
        ageRatingAuthority:
          type: string
          description: Age rating authority such as ESRB or PEGI.
        ageRatingValue:
          type: string
          description: Authority-specific rating value such as E10+ or 12.
        minAgeYears:
          type: integer
          format: int32
          description: Minimum recommended player age.
    CatalogTitleSummary:
      type: object
      description: Public-facing summary for a catalog title.
      required: [id, organizationId, organizationSlug, slug, contentKind, lifecycleStatus, visibility, currentMetadataRevision, displayName, shortDescription, genreDisplay, minPlayers, maxPlayers, playerCountDisplay, ageRatingAuthority, ageRatingValue, minAgeYears, ageDisplay]
      properties:
        id:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        organizationSlug:
          type: string
        slug:
          type: string
        contentKind:
          $ref: '#/components/schemas/TitleContentKind'
        lifecycleStatus:
          $ref: '#/components/schemas/TitleLifecycleStatus'
        visibility:
          $ref: '#/components/schemas/TitleVisibility'
        currentMetadataRevision:
          type: integer
          format: int32
          description: Currently active metadata revision number for the title.
        displayName:
          type: string
        shortDescription:
          type: string
        genreDisplay:
          type: string
        minPlayers:
          type: integer
          format: int32
        maxPlayers:
          type: integer
          format: int32
        playerCountDisplay:
          type: string
          description: Derived display string based on `minPlayers` and `maxPlayers`.
        ageRatingAuthority:
          type: string
        ageRatingValue:
          type: string
        minAgeYears:
          type: integer
          format: int32
        ageDisplay:
          type: string
          description: Derived display string based on `ageRatingAuthority` and `ageRatingValue`.
    CatalogTitle:
      allOf:
        - $ref: '#/components/schemas/CatalogTitleSummary'
        - type: object
          description: Public-facing detailed catalog title.
          required: [description, createdAt, updatedAt]
          properties:
            description:
              type: string
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
    DeveloperTitle:
      allOf:
        - $ref: '#/components/schemas/CatalogTitle'
    CatalogTitleListResponse:
      type: object
      required: [titles]
      properties:
        titles:
          type: array
          items:
            $ref: '#/components/schemas/CatalogTitleSummary'
    CatalogTitleResponse:
      type: object
      required: [title]
      properties:
        title:
          $ref: '#/components/schemas/CatalogTitle'
    DeveloperTitleListResponse:
      type: object
      required: [titles]
      properties:
        titles:
          type: array
          items:
            $ref: '#/components/schemas/CatalogTitleSummary'
    DeveloperTitleResponse:
      type: object
      required: [title]
      properties:
        title:
          $ref: '#/components/schemas/DeveloperTitle'
    CreateTitleRequest:
      type: object
      description: Request payload for creating a title with its initial metadata revision.
      required: [slug, contentKind, lifecycleStatus, visibility, metadata]
      properties:
        slug:
          type: string
        contentKind:
          $ref: '#/components/schemas/TitleContentKind'
        lifecycleStatus:
          $ref: '#/components/schemas/TitleLifecycleStatus'
        visibility:
          $ref: '#/components/schemas/TitleVisibility'
        metadata:
          $ref: '#/components/schemas/TitleMetadataInput'
    UpdateTitleRequest:
      type: object
      description: Request payload for updating stable title fields.
      required: [slug, contentKind, lifecycleStatus, visibility]
      properties:
        slug:
          type: string
        contentKind:
          $ref: '#/components/schemas/TitleContentKind'
        lifecycleStatus:
          $ref: '#/components/schemas/TitleLifecycleStatus'
        visibility:
          $ref: '#/components/schemas/TitleVisibility'
    UpsertTitleMetadataRequest:
      allOf:
        - $ref: '#/components/schemas/TitleMetadataInput'
      description: Request payload for updating or creating the current metadata revision.
    TitleMetadataVersion:
      allOf:
        - $ref: '#/components/schemas/TitleMetadataInput'
        - type: object
          description: Developer-facing metadata revision record for a title.
          required: [revisionNumber, isCurrent, isFrozen, playerCountDisplay, ageDisplay, createdAt, updatedAt]
          properties:
            revisionNumber:
              type: integer
              format: int32
            isCurrent:
              type: boolean
            isFrozen:
              type: boolean
            playerCountDisplay:
              type: string
            ageDisplay:
              type: string
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
    TitleMetadataVersionListResponse:
      type: object
      required: [metadataVersions]
      properties:
        metadataVersions:
          type: array
          items:
            $ref: '#/components/schemas/TitleMetadataVersion'
    ProblemDetails:
      type: object
      required: [title, status]
      properties:
        type:
          type: string
          format: uri
          nullable: true
        title:
          type: string
        status:
          type: integer
          format: int32
        detail:
          type: string
          nullable: true
        code:
          type: string
          nullable: true
    ValidationProblemDetails:
      allOf:
        - $ref: '#/components/schemas/ProblemDetails'
        - type: object
          required: [errors]
          properties:
            errors:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
