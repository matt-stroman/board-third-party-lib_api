        shortDescription:
          type: string
        genreDisplay:
          type: string
        minPlayers:
          type: integer
          format: int32
        maxPlayers:
          type: integer
          format: int32
        playerCountDisplay:
          type: string
          description: Derived display string based on `minPlayers` and `maxPlayers`.
        ageRatingAuthority:
          type: string
        ageRatingValue:
          type: string
        minAgeYears:
          type: integer
          format: int32
        ageDisplay:
          type: string
          description: Derived display string based on `ageRatingAuthority` and `ageRatingValue`.
        cardImageUrl:
          type: string
          format: uri
          nullable: true
          description: Card/list image URL when the title has a configured `card` media asset.
        acquisitionUrl:
          type: string
          format: uri
          nullable: true
          description: External acquisition URL for the title's current enabled primary binding when configured.
    CatalogTitle:
      allOf:
        - $ref: '#/components/schemas/CatalogTitleSummary'
        - type: object
          description: Public-facing detailed catalog title.
          required: [description, mediaAssets, createdAt, updatedAt]
          properties:
            description:
              type: string
            mediaAssets:
              type: array
              items:
                $ref: '#/components/schemas/TitleMediaAsset'
            currentRelease:
              $ref: '#/components/schemas/CurrentTitleRelease'
            acquisition:
              $ref: '#/components/schemas/PublicTitleAcquisition'
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
    DeveloperTitle:
      allOf:
        - $ref: '#/components/schemas/CatalogTitle'
        - type: object
          properties:
            currentReleaseId:
              type: string
              format: uuid
              nullable: true
    CatalogTitleListResponse:
      type: object
      required: [titles, paging]
      properties:
        titles:
          type: array
          items:
            $ref: '#/components/schemas/CatalogTitleSummary'
        paging:
          $ref: '#/components/schemas/CatalogPaging'
    CatalogPaging:
      type: object
      required: [pageNumber, pageSize, totalCount, totalPages, hasPreviousPage, hasNextPage]
      properties:
        pageNumber:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
        totalCount:
          type: integer
          format: int32
        totalPages:
          type: integer
          format: int32
        hasPreviousPage:
          type: boolean
        hasNextPage:
          type: boolean
    CatalogTitleResponse:
      type: object
      required: [title]
      properties:
        title:
          $ref: '#/components/schemas/CatalogTitle'
    DeveloperTitleListResponse:
      type: object
      required: [titles]
      properties:
        titles:
          type: array
          items:
            $ref: '#/components/schemas/CatalogTitleSummary'
    DeveloperTitleResponse:
      type: object
      required: [title]
      properties:
        title:
          $ref: '#/components/schemas/DeveloperTitle'
    CreateTitleRequest:
      type: object
      description: Request payload for creating a title with its initial metadata revision.
      required: [slug, contentKind, lifecycleStatus, visibility, metadata]
      properties:
        slug:
          type: string
        contentKind:
          $ref: '#/components/schemas/TitleContentKind'
        lifecycleStatus:
          $ref: '#/components/schemas/TitleLifecycleStatus'
        visibility:
          $ref: '#/components/schemas/TitleVisibility'
        metadata:
          $ref: '#/components/schemas/TitleMetadataInput'
    UpdateTitleRequest:
      type: object
      description: Request payload for updating stable title fields.
      required: [slug, contentKind, lifecycleStatus, visibility]
      properties:
        slug:
          type: string
        contentKind:
          $ref: '#/components/schemas/TitleContentKind'
        lifecycleStatus:
          $ref: '#/components/schemas/TitleLifecycleStatus'
        visibility:
          $ref: '#/components/schemas/TitleVisibility'
    UpsertTitleMetadataRequest:
      allOf:
        - $ref: '#/components/schemas/TitleMetadataInput'
      description: Request payload for updating or creating the current metadata revision.
    TitleMetadataVersion:
      allOf:
        - $ref: '#/components/schemas/TitleMetadataInput'
        - type: object
          description: Developer-facing metadata revision record for a title.
          required: [revisionNumber, isCurrent, isFrozen, playerCountDisplay, ageDisplay, createdAt, updatedAt]
          properties:
            revisionNumber:
              type: integer
              format: int32
            isCurrent:
              type: boolean
            isFrozen:
              type: boolean
            playerCountDisplay:
              type: string
            ageDisplay:
              type: string
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
    TitleMetadataVersionListResponse:
      type: object
      required: [metadataVersions]
      properties:
        metadataVersions:
          type: array
          items:
            $ref: '#/components/schemas/TitleMetadataVersion'
    TitleMediaAssetListResponse:
      type: object
      required: [mediaAssets]
      properties:
        mediaAssets:
          type: array
          items:
            $ref: '#/components/schemas/TitleMediaAsset'
    TitleMediaAssetResponse:
      type: object
      required: [mediaAsset]
      properties:
        mediaAsset:
          $ref: '#/components/schemas/TitleMediaAsset'
    TitleRelease:
      allOf:
        - $ref: '#/components/schemas/TitleReleaseSummary'
    TitleReleaseListResponse:
      type: object
      required: [releases]
      properties:
        releases:
          type: array
          items:
            $ref: '#/components/schemas/TitleRelease'
    TitleReleaseResponse:
      type: object
      required: [release]
      properties:
        release:
          $ref: '#/components/schemas/TitleRelease'
    ReleaseArtifactListResponse:
      type: object
      required: [artifacts]
      properties:
        artifacts:
          type: array
          items:
            $ref: '#/components/schemas/ReleaseArtifact'
    ReleaseArtifactResponse:
      type: object
      required: [artifact]
      properties:
        artifact:
          $ref: '#/components/schemas/ReleaseArtifact'
    ProblemDetails:
      type: object
      required: [title, status]
      properties:
        type:
          type: string
          format: uri
          nullable: true
        title:
          type: string
        status:
          type: integer
          format: int32
        detail:
          type: string
          nullable: true
        code:
          type: string
          nullable: true
    ValidationProblemDetails:
      allOf:
        - $ref: '#/components/schemas/ProblemDetails'
        - type: object
          required: [errors]
          properties:
            errors:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
