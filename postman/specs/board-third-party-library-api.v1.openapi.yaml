  /developer/titles/{titleId}/metadata-versions/{revisionNumber}/activate:
    post:
      tags: [Catalog]
      summary: Activate metadata revision
      description: >
        Reactivates an existing metadata revision for the title. This supports
        rollback to an earlier catalog snapshot.
      operationId: activateTitleMetadataVersion
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
        - name: titleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Title identifier.
        - name: revisionNumber
          in: path
          required: true
          schema:
            type: integer
            format: int32
          description: Metadata revision number to activate.
