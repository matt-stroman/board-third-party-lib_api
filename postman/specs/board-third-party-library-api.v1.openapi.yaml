openapi: 3.0.3
info:
  title: Board Third Party Library API
  version: 1.0.0-draft
  description: >
    Contract-first API definition for the Board Third Party Library.
    This initial slice defines service metadata, health endpoints, and the first
    Wave 1 identity/platform-role endpoints.
servers:
  - url: http://localhost:5085
    description: Local backend (development)
tags:
  - name: Health
    description: Service metadata and health endpoints.
  - name: Identity
    description: User account registration and identity-related endpoints.
  - name: PlatformRoles
    description: Platform-level roles available to users (player, developer, admin, moderator).
paths:
  /:
    get:
      tags: [Health]
      summary: Get API metadata
      description: Returns basic service metadata and advertised health endpoints.
      operationId: getApiMetadata
      responses:
        '200':
          description: API metadata returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiMetadataResponse'
              examples:
                default:
                  summary: Local development response
                  value:
                    service: board-third-party-lib-backend
                    endpoints:
                      - /health/live
                      - /health/ready
  /health/live:
    get:
      tags: [Health]
      summary: Liveness health check
      description: >
        Indicates whether the API process is running. Does not check downstream dependencies.
      operationId: getLivenessHealth
      responses:
        '200':
          description: API process is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                healthy:
                  summary: Typical healthy liveness response
                  value:
                    status: Healthy
                    checks: []
                    durationMs: 0.2149
  /health/ready:
    get:
      tags: [Health]
      summary: Readiness health check
      description: >
        Indicates whether the API is ready to serve requests, including downstream dependency checks
        (currently PostgreSQL connectivity).
      operationId: getReadinessHealth
      parameters:
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
      responses:
        '200':
          description: API is ready and dependencies are healthy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                healthy:
                  summary: PostgreSQL dependency is healthy
                  value:
                    status: Healthy
                    checks:
                      - name: postgres
                        status: Healthy
                        description: PostgreSQL connection succeeded.
                        data:
                          database: board_tpl
                          user: board_tpl_user
                    durationMs: 6.1373
        '503':
          description: API is running but not ready due to dependency failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                postgres-unhealthy:
                  summary: PostgreSQL dependency failure
                  value:
                    status: Unhealthy
                    checks:
                      - name: postgres
                        status: Unhealthy
                        description: PostgreSQL connection failed.
                    durationMs: 12.551
  /identity/roles:
    get:
      tags: [PlatformRoles]
      summary: List platform roles
      description: >
        Returns the platform-level roles that can be assigned to users. These are global
        roles (for example player/developer/admin) and are distinct from organization-scoped roles.
      operationId: listPlatformRoles
      responses:
        '200':
          description: Platform roles returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformRoleListResponse'
              examples:
                default:
                  summary: Default system platform roles
                  value:
                    roles:
                      - code: player
                        displayName: Player
                        scope: platform
                      - code: developer
                        displayName: Developer
                        scope: platform
                      - code: admin
                        displayName: Admin
                        scope: platform
                      - code: moderator
                        displayName: Moderator
                        scope: platform
  /identity/register/email:
    post:
      tags: [Identity]
      summary: Register account with email and password
      description: >
        Creates a new user account using email and password authentication and assigns one or more
        requested platform roles (for example player/developer). Additional OAuth identities may be linked later.
      operationId: registerUserWithEmail
      parameters:
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterEmailRequest'
            examples:
              player-and-developer:
                summary: Register a combined player/developer account
                value:
                  email: alex@example.com
                  password: StrongPassword!123
                  displayName: Alex Rivers
                  requestedRoleCodes:
                    - player
                    - developer
      responses:
        '201':
          description: Account registered successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterEmailResponse'
              examples:
                created:
                  summary: Newly registered user account
                  value:
                    user:
                      id: 9d65dc87-c5d2-4a1a-aac0-9414968e8b47
                      displayName: Alex Rivers
                      status: active
                      roles:
                        - player
                        - developer
                    primaryEmail:
                      email: alex@example.com
                      verified: false
        '409':
          description: Email address is already registered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                duplicate-email:
                  summary: Duplicate email address
                  value:
                    type: https://boardtpl.dev/problems/duplicate-email
                    title: Duplicate email address
                    status: 409
                    detail: An account with this email address already exists.
                    code: duplicate_email
        '422':
          description: Validation failed for the request payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationProblemDetails'
              examples:
                invalid-request:
                  summary: Password too short and missing role
                  value:
                    type: https://boardtpl.dev/problems/validation-error
                    title: Request validation failed
                    status: 422
                    code: validation_error
                    errors:
                      password:
                        - Password must meet minimum complexity requirements.
                      requestedRoleCodes:
                        - At least one platform role must be requested.
  /identity/me/email-addresses:
    get:
      tags: [Identity]
      summary: List my email addresses
      description: >
        Returns the current user's email addresses, including primary/verification status.
        Requires an authenticated end-user bearer token.
      operationId: listMyEmailAddresses
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User email addresses returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEmailAddressListResponse'
              examples:
                default:
                  summary: User with primary and secondary email addresses
                  value:
                    emailAddresses:
                      - id: e7fb8793-8443-487b-9bfc-e5ef38145c4a
                        email: alex@example.com
                        verified: true
                        isPrimary: true
                        status: active
                      - id: 489a1540-39f5-499f-a4fd-1874a0136d31
                        email: alex.rivers@example.com
                        verified: false
                        isPrimary: false
                        status: pending_verification
        '401':
          $ref: '#/components/responses/UnauthorizedProblemResponse'
        '403':
          $ref: '#/components/responses/ForbiddenProblemResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsProblemResponse'
    post:
      tags: [Identity]
      summary: Add email address
      description: >
        Adds a new email address to the current user's account in pending verification status.
        The email can become primary after verification.
      operationId: addMyEmailAddress
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddUserEmailAddressRequest'
            examples:
              add-secondary:
                summary: Add a secondary email address
                value:
                  email: alex.rivers@example.com
      responses:
        '201':
          description: Email address added and verification is pending.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddUserEmailAddressResponse'
              examples:
                created:
                  summary: Pending verification email address created
                  value:
                    emailAddress:
                      id: 489a1540-39f5-499f-a4fd-1874a0136d31
                      email: alex.rivers@example.com
                      verified: false
                      isPrimary: false
                      status: pending_verification
        '409':
          description: Email address is already in use by another account.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                duplicate-email:
                  summary: Duplicate email address
                  value:
                    type: https://boardtpl.dev/problems/duplicate-email
                    title: Duplicate email address
                    status: 409
                    detail: This email address is already associated with another account.
                    code: duplicate_email
        '422':
          description: Validation failed for the request payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationProblemDetails'
              examples:
                invalid-email:
                  summary: Invalid email address format
                  value:
                    type: https://boardtpl.dev/problems/validation-error
                    title: Request validation failed
                    status: 422
                    code: validation_error
                    errors:
                      email:
                        - A valid email address is required.
        '401':
          $ref: '#/components/responses/UnauthorizedProblemResponse'
        '403':
          $ref: '#/components/responses/ForbiddenProblemResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsProblemResponse'
  /identity/me/email-addresses/{emailAddressId}/make-primary:
    post:
      tags: [Identity]
      summary: Make email address primary
      description: >
        Sets the specified email address as the current user's primary email address.
        The target email address must already be verified.
      operationId: makeMyEmailAddressPrimary
      security:
        - BearerAuth: []
      parameters:
        - name: emailAddressId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
      responses:
        '200':
          description: Primary email address updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEmailAddressListResponse'
              examples:
                primary-changed:
                  summary: Primary email switched to another verified address
                  value:
                    emailAddresses:
                      - id: e7fb8793-8443-487b-9bfc-e5ef38145c4a
                        email: alex@example.com
                        verified: true
                        isPrimary: false
                        status: active
                      - id: 489a1540-39f5-499f-a4fd-1874a0136d31
                        email: alex.rivers@example.com
                        verified: true
                        isPrimary: true
                        status: active
        '404':
          description: Email address not found for the current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                not-found:
                  summary: Email address ID does not exist for the user
                  value:
                    type: https://boardtpl.dev/problems/email-address-not-found
                    title: Email address not found
                    status: 404
                    detail: The requested email address was not found for the current user.
                    code: email_address_not_found
        '409':
          description: Email address cannot be made primary because it is not yet verified.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                email-not-verified:
                  summary: Target email address must be verified before becoming primary
                  value:
                    type: https://boardtpl.dev/problems/email-not-verified
                    title: Email address is not verified
                    status: 409
                    detail: Verify this email address before setting it as primary.
                    code: email_not_verified
        '401':
          $ref: '#/components/responses/UnauthorizedProblemResponse'
        '403':
          $ref: '#/components/responses/ForbiddenProblemResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsProblemResponse'
  /identity/me/email-addresses/{emailAddressId}/send-verification:
    post:
      tags: [Identity]
      summary: Send email verification challenge
      description: >
        Sends or re-sends an email verification challenge for the specified email address.
        The target email address must belong to the current user and must not already be verified.
      operationId: sendMyEmailAddressVerificationChallenge
      security:
        - BearerAuth: []
      parameters:
        - name: emailAddressId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
      responses:
        '202':
          description: Verification challenge accepted for delivery.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendUserEmailVerificationChallengeResponse'
              examples:
                accepted:
                  summary: Verification email queued/sent
                  value:
                    verificationChallenge:
                      emailAddressId: 489a1540-39f5-499f-a4fd-1874a0136d31
                      deliveryChannel: email
                      destinationHint: a***.r******@example.com
                      status: sent
                      expiresAt: '2026-02-23T12:15:00Z'
                      resendAvailableAt: '2026-02-23T11:56:00Z'
        '404':
          description: Email address not found for the current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                not-found:
                  summary: Email address ID does not exist for the user
                  value:
                    type: https://boardtpl.dev/problems/email-address-not-found
                    title: Email address not found
                    status: 404
                    detail: The requested email address was not found for the current user.
                    code: email_address_not_found
        '409':
          description: Email address is already verified and does not require a verification challenge.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                already-verified:
                  summary: Email address already verified
                  value:
                    type: https://boardtpl.dev/problems/email-already-verified
                    title: Email address is already verified
                    status: 409
                    detail: This email address is already verified.
                    code: email_already_verified
        '401':
          $ref: '#/components/responses/UnauthorizedProblemResponse'
        '403':
          $ref: '#/components/responses/ForbiddenProblemResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsProblemResponse'
  /identity/me/email-addresses/{emailAddressId}/verify:
    post:
      tags: [Identity]
      summary: Verify email address
      description: >
        Confirms ownership of the specified email address using a verification code previously sent
        to that address.
      operationId: verifyMyEmailAddress
      security:
        - BearerAuth: []
      parameters:
        - name: emailAddressId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyUserEmailAddressRequest'
            examples:
              code-entry:
                summary: User submits emailed verification code
                value:
                  code: '482913'
      responses:
        '200':
          description: Email address verified successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyUserEmailAddressResponse'
              examples:
                verified:
                  summary: Email address verified and activated
                  value:
                    emailAddress:
                      id: 489a1540-39f5-499f-a4fd-1874a0136d31
                      email: alex.rivers@example.com
                      verified: true
                      isPrimary: false
                      status: active
        '404':
          description: Email address not found for the current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                not-found:
                  summary: Email address ID does not exist for the user
                  value:
                    type: https://boardtpl.dev/problems/email-address-not-found
                    title: Email address not found
                    status: 404
                    detail: The requested email address was not found for the current user.
                    code: email_address_not_found
        '409':
          description: Verification code is invalid, expired, or no longer applicable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                invalid-or-expired-code:
                  summary: Verification code invalid or expired
                  value:
                    type: https://boardtpl.dev/problems/verification-code-invalid
                    title: Verification code is invalid or expired
                    status: 409
                    detail: The verification code is invalid, expired, or has already been used.
                    code: verification_code_invalid
        '422':
          description: Validation failed for the request payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationProblemDetails'
              examples:
                invalid-code-format:
                  summary: Verification code is missing or malformed
                  value:
                    type: https://boardtpl.dev/problems/validation-error
                    title: Request validation failed
                    status: 422
                    code: validation_error
                    errors:
                      code:
                        - A verification code is required.
        '401':
          $ref: '#/components/responses/UnauthorizedProblemResponse'
        '403':
          $ref: '#/components/responses/ForbiddenProblemResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsProblemResponse'
  /identity/me:
    get:
      tags: [Identity]
      summary: Get current user profile
      description: Returns the authenticated user's identity profile summary.
      operationId: getCurrentUserProfile
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user profile returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserProfileResponse'
              examples:
                default:
                  summary: Authenticated user profile
                  value:
                    user:
                      id: 9d65dc87-c5d2-4a1a-aac0-9414968e8b47
                      displayName: Alex Rivers
                      status: active
                      roles:
                        - player
                        - developer
                    primaryEmail:
                      id: e7fb8793-8443-487b-9bfc-e5ef38145c4a
                      email: alex@example.com
                      verified: true
                      isPrimary: true
                      status: active
        '401':
          $ref: '#/components/responses/UnauthorizedProblemResponse'
        '403':
          $ref: '#/components/responses/ForbiddenProblemResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsProblemResponse'
  /identity/auth/login/email:
    post:
      tags: [Identity]
      summary: Login with email and password
      description: >
        Authenticates a user with email/password credentials and issues bearer/refresh tokens.
        Accounts with unverified email addresses may still be allowed to authenticate in MVP so they can
        complete the `/identity/me/email-addresses/*` verification workflow; client applications should
        evaluate email verification status before enabling sensitive actions.
      operationId: loginWithEmail
      parameters:
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginWithEmailRequest'
            examples:
              default:
                summary: Valid login request
                value:
                  email: alex@example.com
                  password: StrongPassword!123
      responses:
        '200':
          description: Login succeeded and tokens were issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenPairResponse'
              examples:
                success:
                  summary: Access and refresh tokens issued
                  value:
                    tokenType: Bearer
                    accessToken: eyJhbGciOi...mock-access-token
                    accessTokenExpiresInSeconds: 3600
                    refreshToken: rft_mock_1234567890
                    refreshTokenExpiresAt: '2026-03-02T12:00:00Z'
                    user:
                      id: 9d65dc87-c5d2-4a1a-aac0-9414968e8b47
                      displayName: Alex Rivers
                      status: active
                      roles:
                        - player
                        - developer
        '401':
          description: Invalid email/password combination.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                invalid-credentials:
                  summary: Invalid credentials
                  value:
                    type: https://boardtpl.dev/problems/invalid-credentials
                    title: Invalid credentials
                    status: 401
                    detail: The email or password is incorrect.
                    code: invalid_credentials
        '422':
          description: Validation failed for the request payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationProblemDetails'
              examples:
                invalid-request:
                  summary: Missing password
                  value:
                    type: https://boardtpl.dev/problems/validation-error
                    title: Request validation failed
                    status: 422
                    code: validation_error
                    errors:
                      password:
                        - Password is required.
        '429':
          $ref: '#/components/responses/TooManyRequestsProblemResponse'
  /identity/auth/refresh:
    post:
      tags: [Identity]
      summary: Refresh authentication tokens
      description: >
        Exchanges a valid refresh token for a new bearer token and a replacement refresh token.
        The returned refresh token replaces the previously presented refresh token (rotation); clients
        must persist the new refresh token and discard the old one after a successful response.
      operationId: refreshAuthTokens
      parameters:
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshAuthTokensRequest'
            examples:
              default:
                summary: Refresh token request
                value:
                  refreshToken: rft_mock_1234567890
      responses:
        '200':
          description: Tokens refreshed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenPairResponse'
              examples:
                success:
                  summary: Token refresh succeeded
                  value:
                    tokenType: Bearer
                    accessToken: eyJhbGciOi...rotated-access-token
                    accessTokenExpiresInSeconds: 3600
                    refreshToken: rft_mock_rotated_1234567890
                    refreshTokenExpiresAt: '2026-03-02T13:00:00Z'
                    user:
                      id: 9d65dc87-c5d2-4a1a-aac0-9414968e8b47
                      displayName: Alex Rivers
                      status: active
                      roles:
                        - player
                        - developer
        '401':
          description: Refresh token is invalid, expired, or revoked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                invalid-refresh-token:
                  summary: Refresh token invalid
                  value:
                    type: https://boardtpl.dev/problems/invalid-refresh-token
                    title: Refresh token is invalid or expired
                    status: 401
                    detail: The refresh token is invalid, expired, or revoked.
                    code: invalid_refresh_token
        '422':
          description: Validation failed for the request payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationProblemDetails'
              examples:
                missing-refresh-token:
                  summary: Refresh token required
                  value:
                    type: https://boardtpl.dev/problems/validation-error
                    title: Request validation failed
                    status: 422
                    code: validation_error
                    errors:
                      refreshToken:
                        - Refresh token is required.
        '429':
          $ref: '#/components/responses/TooManyRequestsProblemResponse'
  /identity/auth/logout:
    post:
      tags: [Identity]
      summary: Logout current session
      description: >
        Logs out the authenticated user by revoking refresh-token/session state according to the requested
        logout scope. This endpoint is idempotent for already-revoked refresh tokens/session state, but a
        valid bearer token is still required to invoke it.
      operationId: logoutCurrentSession
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
            examples:
              with-refresh-token:
                summary: Logout and revoke refresh token
                value:
                  refreshToken: rft_mock_1234567890
      responses:
        '204':
          description: >
            Logout processed successfully (idempotent). Refresh-token/session state is revoked according to
            the requested scope.
        '401':
          $ref: '#/components/responses/UnauthorizedProblemResponse'
        '403':
          $ref: '#/components/responses/ForbiddenProblemResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsProblemResponse'
  /identity/me/password/change:
    post:
      tags: [Identity]
      summary: Change password
      description: >
        Changes the authenticated user's local password credential. Implementations should invalidate
        outstanding password-reset challenges and revoke refresh-token/session state after a successful
        password change (current request may complete before revocation takes effect).
      operationId: changeMyPassword
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
            examples:
              default:
                summary: Password change request
                value:
                  currentPassword: StrongPassword!123
                  newPassword: EvenStrongerPassword!456
      responses:
        '204':
          description: Password changed successfully.
        '401':
          $ref: '#/components/responses/UnauthorizedProblemResponse'
        '403':
          $ref: '#/components/responses/ForbiddenProblemResponse'
        '409':
          description: Current password is incorrect.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                invalid-current-password:
                  summary: Current password mismatch
                  value:
                    type: https://boardtpl.dev/problems/invalid-current-password
                    title: Current password is incorrect
                    status: 409
                    detail: The provided current password does not match the stored credential.
                    code: invalid_current_password
        '422':
          description: Validation failed for the request payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationProblemDetails'
              examples:
                weak-password:
                  summary: New password fails policy
                  value:
                    type: https://boardtpl.dev/problems/validation-error
                    title: Request validation failed
                    status: 422
                    code: validation_error
                    errors:
                      newPassword:
                        - Password must meet minimum complexity requirements.
        '429':
          $ref: '#/components/responses/TooManyRequestsProblemResponse'
  /identity/password/forgot:
    post:
      tags: [Identity]
      summary: Request password reset
      description: >
        Requests a password reset challenge for the supplied email address. Response is intentionally generic
        to prevent account enumeration. Implementations should issue short-lived, one-time-use reset tokens
        and may invalidate previously outstanding reset challenges for the same account when a new one is issued.
      operationId: requestPasswordReset
      parameters:
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
            examples:
              default:
                summary: Password reset request
                value:
                  email: alex@example.com
      responses:
        '202':
          description: Password reset request accepted for processing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedActionResponse'
              examples:
                accepted:
                  summary: Generic accepted response
                  value:
                    accepted: true
                    message: If an account exists for this email address, password reset instructions will be sent.
        '422':
          description: Validation failed for the request payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationProblemDetails'
              examples:
                invalid-email:
                  summary: Invalid email address format
                  value:
                    type: https://boardtpl.dev/problems/validation-error
                    title: Request validation failed
                    status: 422
                    code: validation_error
                    errors:
                      email:
                        - A valid email address is required.
        '429':
          $ref: '#/components/responses/TooManyRequestsProblemResponse'
  /identity/password/reset:
    post:
      tags: [Identity]
      summary: Reset password with verification token
      description: >
        Resets a user's password using a previously issued password-reset token/code. Reset tokens are
        intended to be short-lived and one-time-use; a successful reset should invalidate the used token,
        any other outstanding reset challenges for the account, and existing refresh-token/session state.
      operationId: resetPassword
      parameters:
        - $ref: '#/components/parameters/PostmanMockResponseCodeHeader'
        - $ref: '#/components/parameters/PostmanMockResponseNameHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
            examples:
              default:
                summary: Password reset completion request
                value:
                  email: alex@example.com
                  resetToken: prt_mock_482913
                  newPassword: EvenStrongerPassword!456
      responses:
        '204':
          description: Password reset successfully.
        '409':
          description: Reset token is invalid, expired, or already used.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                invalid-reset-token:
                  summary: Reset token invalid or expired
                  value:
                    type: https://boardtpl.dev/problems/password-reset-token-invalid
                    title: Password reset token is invalid or expired
                    status: 409
                    detail: The password reset token is invalid, expired, or has already been used.
                    code: password_reset_token_invalid
        '422':
          description: Validation failed for the request payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationProblemDetails'
              examples:
                invalid-request:
                  summary: Missing reset token
                  value:
                    type: https://boardtpl.dev/problems/validation-error
                    title: Request validation failed
                    status: 422
                    code: validation_error
                    errors:
                      resetToken:
                        - Reset token is required.
        '429':
          $ref: '#/components/responses/TooManyRequestsProblemResponse'
  /identity/me/external-identities:
    get:
      tags: [Identity]
