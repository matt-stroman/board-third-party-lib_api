                      - id: 2d405181-c86d-4a9d-a2f7-2d53f6e81630
                        provider: github
                        providerUserId: '12345678'
                        providerDisplayName: alexrivers
                        linkedAt: '2026-02-23T10:15:00Z'
                      - id: a2aa9650-88bc-4879-9d7b-435dbb8b4888
                        provider: steam
                        providerUserId: '76561198000000000'
                        providerDisplayName: AlexRiversSteam
                        linkedAt: '2026-02-23T10:20:00Z'
        '401':
          $ref: '#/components/responses/UnauthorizedProblemResponse'
        '403':
